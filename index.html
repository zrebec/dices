<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <title>Dices</title>
  <script type="module" crossorigin src="/dices/assets/index-BSIntO50.js"></script>
  <link rel="stylesheet" crossorigin href="/dices/assets/index-D28uV6Np.css">
</head>

<body>
  <header>
    Dice Roller
  </header>
  <main class="content">
    <div class="roll-settings-wrap">
      <span class="settings-label">Roll Settings</span>
      <div class="roll-settings">
        <div class="setting-row">
          <span class="setting-name">Speed</span>
          <input type="range" id="speedSlider" class="speed-slider" min="1" max="5" value="3" step="1">
          <span id="speedLabel" class="setting-value">Normal</span>
        </div>
        <div class="setting-row">
          <span class="setting-name">Max Rolls</span>
          <label class="unlimited-label">
            <input type="checkbox" id="unlimitedToggle" checked>
            <span>Unlimited</span>
          </label>
          <input type="number" id="maxRollsInput" class="max-rolls-input" min="1" max="999" value="50" disabled>
        </div>
      </div>
    </div>
    <div class="game-modes-wrap">
      <span class="game-modes-label">Game Mode</span>
      <div id="gameModes" class="game-modes">
        <button class="game-mode-btn" data-mode="allEqual">All Equal</button>
        <button class="game-mode-btn" data-mode="pairs">Pairs</button>
        <button class="game-mode-btn" data-mode="sequence">Sequence</button>
        <button class="game-mode-btn" data-mode="evenOdd">Even / Odd</button>
        <button class="game-mode-btn" data-mode="anything">Anything</button>
      </div>
    </div>
    <div id="diceContainer" class="dice-container"></div>
    <div class="stats-container">
      <div class="stat-card">
        <span class="stat-value" id="statsSumValue">0</span>
        <span class="stat-label">Sum</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statsAvgValue">0</span>
        <span class="stat-label">Average</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="totalRollCountValue">0</span>
        <span class="stat-label">Rolls</span>
      </div>
    </div>
    <div class="timer-wrap">
      <span id="totalElapsedTime" class="timer">00:00:00</span>
    </div>
    <div id="alert" class="alert-msg" style="display: none;"></div>
    <div class="buttons">
      <button id="btnRoll" class="btn btn-primary" disabled>
        Roll <kbd>R</kbd>
      </button>
      <button id="btnPlus" class="btn btn-secondary" disabled>
        +1 Dice <kbd>Space</kbd>
      </button>
    </div>
  </main>
  <footer>
    <span>Created in 2022</span>
    <span id="appVersion"></span>
    <span>Last Update 2026</span>
  </footer>
</body>

</html>
